<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AIHospiceOS — Compliance Operating System</title>
    <meta name="description" content="AI-powered hospice compliance scoring, chart review, and regulatory watch." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0F1B21" />
    <link rel="icon" href="/icon-192.png" />

    <!-- iOS install support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AIHospiceOS" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <style>
      html, body, #root { height: 100%; }
      body { margin: 0; background: #0F1B21; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
