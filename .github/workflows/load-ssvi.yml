name: Load CMS SSVI Data into Supabase

on:
  workflow_dispatch:

jobs:
  load-ssvi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install xlsx node-fetch@2 @supabase/supabase-js adm-zip ws

      - name: Download and parse CMS SSVI data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node .github/scripts/load-ssvi.js
